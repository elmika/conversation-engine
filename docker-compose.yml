services:

  # FastAPI backend
  api:
    build:
      context: .
      target: runner
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  # Next.js frontend — hot-reload dev server
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot-reload
      - ./frontend:/app
      # Named volume so node_modules installed inside the container
      # are not shadowed by the (empty) host directory
      - frontend_node_modules:/app/node_modules
    environment:
      # Resolved server-side by Next.js Route Handlers — never sent to the browser
      FASTAPI_URL: http://api:8000
    depends_on:
      - api

volumes:
  frontend_node_modules:
